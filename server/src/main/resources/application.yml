spring:
  application:
    name: webchat

  datasource:
    url: jdbc:mysql://10.204.56.4:3306/webchat?rewriteBatchedStatements=true&characterEncoding=UTF-8&useOldAliasMetadataBehavior=true
    username: root
    password: kMwJkX_488af
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/javascript,text/css,text/html,image/svg+xml
    min-response-size: 1024

# JWT 配置
jwt:
  secret: your-super-secret-jwt-key-change-this-in-production-must-be-at-least-256-bits
  expiration: 604800000  # 7 days in milliseconds

# CORS 配置
cors:
  allowed-origins: http://localhost:1420,http://localhost:5173,tauri://localhost,https://tauri.localhost
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
